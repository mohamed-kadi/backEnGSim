spring.application.name=Backend Engineering Lab
spring.datasource.url=jdbc:postgresql://localhost:5433/backendlab
spring.datasource.username=labuser
spring.datasource.password=labpassword
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=backendlab-group
spring.kafka.consumer.auto-offset-reset=earliest

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
